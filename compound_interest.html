<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Compound Interest Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
    }
    .inputs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }
    .inputs div {
      display: flex;
      flex-direction: column;
    }
    label {
      font-weight: bold;
      margin-bottom: 5px;
    }
    input {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #1e40af;
    }
    canvas {
      margin-top: 30px;
    }
    .result {
      text-align: center;
      font-size: 18px;
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📈 Compound Interest Calculator</h1>

    <div class="inputs">
      <div>
        <label>Principal (₹)</label>
        <input type="number" id="principal" value="100000" />
      </div>
      <div>
        <label>Interest Rate (%)</label>
        <input type="number" id="rate" value="10" />
      </div>
      <div>
        <label>Years</label>
        <input type="number" id="years" value="10" />
      </div>
      <div>
        <label>Compounds / Year</label>
        <input type="number" id="frequency" value="1" />
      </div>
    </div>

    <button onclick="calculate()">Calculate & Plot</button>

    <div class="result" id="result"></div>

    <canvas id="chart"></canvas>
  </div>

  <script>
    let chart;

    function calculate() {
      const P = parseFloat(document.getElementById('principal').value);
      const r = parseFloat(document.getElementById('rate').value) / 100;
      const t = parseInt(document.getElementById('years').value);
      const n = parseInt(document.getElementById('frequency').value);

      let labels = [];
      let data = [];

      for (let year = 0; year <= t; year++) {
        const amount = P * Math.pow(1 + r / n, n * year);
        labels.push(`Year ${year}`);
        data.push(amount.toFixed(2));
      }

      const finalAmount = data[data.length - 1];
      document.getElementById('result').innerText = `Final Amount: ₹${finalAmount}`;

      if (chart) chart.destroy();

      const ctx = document.getElementById('chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'Investment Growth',
            data: data,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: true }
          },
          scales: {
            x: { title: { display: true, text: 'Time' } },
            y: { title: { display: true, text: 'Amount (₹)' } }
          }
        }
      });
    }

    calculate();
  </script>
</body>
</html>
